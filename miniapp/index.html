<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Company Insight — 기업인사이트</title>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <span class="logo">📊 Company Insight</span>
      <span class="tagline">기업 분석 리포트 생성기</span>
    </div>
  </header>

  <main class="main-content">
    <section class="hero">
      <h1>기업명을 입력해서<br>실시간 기업정보를 조회해보세요</h1>
      <p class="hero-sub">DART 공시 + 네이버 금융 데이터 기반</p>
    </section>

    <section class="search-section">
      <form id="search-form" autocomplete="off">
        <div class="input-wrap">
          <input
            type="text"
            id="company-input"
            placeholder="예: 삼성전자, 카카오, LG에너지솔루션"
            required
            maxlength="40"
          />
          <button type="submit" id="submit-btn">리포트 생성</button>
        </div>
      </form>
    </section>

    <div id="loading" class="loading hidden">
      <div class="loading-head">
        <div class="spinner"></div>
        <p>분석 중입니다… 데이터를 수집하고 있습니다</p>
        <div id="quote-box" class="quote-box"></div>
      </div>

      <div class="skeleton" aria-hidden="true">
        <span class="skeleton-tag">이런 화면이 만들어져요</span>

        <div class="sk-card">
          <div class="rp-label">현재 주가</div>
          <div class="sk-bar sk-price"></div>
          <div class="sk-grid">
            <div class="sk-bar sk-kv"></div>
            <div class="sk-bar sk-kv"></div>
            <div class="sk-bar sk-kv"></div>
            <div class="sk-bar sk-kv"></div>
            <div class="sk-bar sk-kv"></div>
            <div class="sk-bar sk-kv"></div>
          </div>
          <div class="sk-bar sk-range"></div>
        </div>

        <div class="sk-card">
          <div class="rp-label">실적</div>
          <div class="sk-row"><span class="sk-bar sk-cell"></span><span class="sk-bar sk-cell"></span><span class="sk-bar sk-cell"></span><span class="sk-bar sk-cell"></span></div>
          <div class="sk-row"><span class="sk-bar sk-cell"></span><span class="sk-bar sk-cell"></span><span class="sk-bar sk-cell"></span><span class="sk-bar sk-cell"></span></div>
          <div class="sk-row"><span class="sk-bar sk-cell"></span><span class="sk-bar sk-cell"></span><span class="sk-bar sk-cell"></span><span class="sk-bar sk-cell"></span></div>
        </div>

        <div class="sk-card">
          <div class="rp-label">배당</div>
          <div class="sk-stats">
            <div class="sk-bar sk-stat"></div>
            <div class="sk-bar sk-stat"></div>
            <div class="sk-bar sk-stat"></div>
          </div>
        </div>

        <div class="sk-card">
          <div class="rp-label">증권가 전망</div>
          <div class="sk-bar sk-target"></div>
          <div class="sk-pills">
            <span class="sk-bar sk-pill"></span>
            <span class="sk-bar sk-pill"></span>
            <span class="sk-bar sk-pill"></span>
          </div>
        </div>
      </div>
    </div>

    <div id="error-box" class="error-box hidden">
      <span class="error-icon">⚠️</span>
      <span id="error-msg"></span>
    </div>

    <section id="result-section" class="result-section hidden">
      <div id="report" class="report"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Company Insight by <strong>TRENQURA</strong></p>
    <p class="footer-sub">데이터 출처: DART Open API, 네이버 금융 · 투자 판단의 책임은 본인에게 있습니다</p>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
